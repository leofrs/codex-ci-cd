name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  pull-requests: write
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Code Standard & Tests
        id: run_tests
        run: npm run lint

      - name: Enviar Erro para o Agente de IA
        if: failure() && steps.run_tests.outcome == 'failure'
        env:
          AI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PR_NUMBER: ${{ github.event.number }} # Passando o número do PR com segurança
        run: |
          echo "=== 1. CAPTURANDO LOGS DE ERRO ==="
          ERROR_LOG=$(timeout 10s npm run lint 2>&1 | tail -n 50)
          CLEAN_LOG=$(echo "$ERROR_LOG" | jq -Rs .)

          echo "=== 2. REQUISITANDO ANÁLISE DA IA ==="
          RESPONSE=$(curl -s --max-time 15 https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"Você é um engenheiro DevOps sénior. Resuma este erro de CI/CD em português de Portugal em até 3 frases e mostre o comando/código exato para corrigir.\"},
                {\"role\": \"user\", \"content\": $CLEAN_LOG}
              ],
              \"temperature\": 0.1,
              \"max_tokens\": 300
            }")

          AI_MESSAGE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Não foi possível gerar uma análise para este erro no momento."')

          echo "=== 3. PUBLICANDO NO STEP SUMMARY (Para Push Direto ou PR) ==="
          echo "### 🤖 Análise de Erro por IA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$AI_MESSAGE" >> $GITHUB_STEP_SUMMARY

          echo "=== 4. VERIFICANDO SE É PULL REQUEST PARA COMENTAR ==="
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Detetado evento de Pull Request. Publicando comentário..."
            
            # CORRIGIDO: O bloco EOF agora está devidamente quebrado em linhas separadas e isoladas
            COMMENT_BODY=$(cat << 'EOF'
### 🤖 Alerta de CI: Falha detetada

A execução dos testes falhou. O assistente de IA analisou os logs e sugere a seguinte correção:

EOF
)
            # Une a mensagem base com a resposta da IA de forma segura
            FULL_COMMENT="$COMMENT_BODY"$'\n'"$AI_MESSAGE"
            
            # Publica o comentário usando a variável de ambiente segura
            gh pr comment "$GH_PR_NUMBER" --body "$FULL_COMMENT"
          else
            echo "Push direto detetado (não é um PR). Ignorando envio de comentário."
          fi