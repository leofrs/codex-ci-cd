name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ] # Executa a cada push nessas branches
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Executa a validação padrão do seu projeto (Testes / Linter)
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # CORRIGIDO: Era 'node-size', o correto é 'node-version'

      - name: Install Dependencies
        run: npm install

      # ETAPA QUE VAI FALHAR: Rodar os testes ou o padrão de código
      - name: Run Code Standard & Tests
        id: run_tests
        run: npm run lint # Se os seus testes quebrarem aqui, o Job falha e o próximo assume

      - name: Enviar Erro para o Agente de IA
        if: failure() && steps.run_tests.outcome == 'failure' # CORRIGIDO: Trocado 'steps:' por 'steps.'
        env:
          # Chave de API salva nos Secrets do seu GitHub
          AI_API_KEY: ${{ secrets.OPENAI_API_KEY }} 
        run: |
          echo "=== 1. CAPTURANDO LOGS DE ERRO ==="
          # Captura as últimas 50 linhas do terminal para enviar à IA
          ERROR_LOG=$(git log -1 --pretty=format:"Commit: %s" && echo "" && echo "Logs recentes:" && timeout 10s npm run test-error 2>&1 | tail -n 50)
          
          echo "=== 2. FORMATANDO O PROMPT ==="
          # Protege o texto para não quebrar o JSON da requisição (lida com múltiplas linhas)
          CLEAN_LOG=$(echo "$ERROR_LOG" | jq -Rs .) # CORRIGIDO: Usando -Rs para escapar strings multilinhas perfeitamente

          echo "=== 3. ENVIANDO PARA A API DA IA ==="
          # Envia os dados via comando cURL usando sua chave de API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"Você é um especialista em DevOps. Analise o erro fornecido, explique o motivo em português de forma curta e direta, e mostre o código ou comando exato para corrigir.\"},
                {\"role\": \"user\", \"content\": $CLEAN_LOG}
              ],
              \"temperature\": 0.2
            }")

          echo "=== 4. RESPOSTA DO AGENTE DE IA ==="
          # Extrai apenas o texto da resposta do JSON retornado pela API
          echo "$RESPONSE" | jq '.choices[0].message.content' -r