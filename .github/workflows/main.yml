name: CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Code Standard & Tests
        id: run_tests
        continue-on-error: true
        run: |
          npm run lint > lint.log 2>&1
          cat lint.log

      - name: Enviar Erro para o Agente de IA
        if: steps.run_tests.outcome == 'failure'
        env:
          AI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "=== 1. CAPTURANDO LOGS DE ERRO ==="

          ERROR_LOG=$(tail -n 80 lint.log)
          CLEAN_LOG=$(jq -Rs . <<< "$ERROR_LOG")

          echo "=== 2. REQUISITANDO ANÁLISE DA IA ==="

          RESPONSE=$(curl -s --max-time 30 https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"Você é um engenheiro DevOps sénior. Resuma este erro de CI/CD em português de Portugal em até 3 frases e mostre o comando ou código exato para corrigir.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": $CLEAN_LOG
                }
              ],
              \"temperature\": 0.1,
              \"max_tokens\": 300
            }")

          AI_MESSAGE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Não foi possível gerar uma análise para este erro no momento."')

          echo "=== 3. PUBLICANDO NO STEP SUMMARY ==="

          {
            echo "### 🤖 Análise de Erro por IA"
            echo ""
            echo "$AI_MESSAGE"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== 4. VERIFICANDO SE É PULL REQUEST PARA COMENTAR ==="

          if [ "$GH_EVENT_NAME" = "pull_request" ]; then
            echo "Detetado Pull Request. Publicando comentário..."

           FULL_COMMENT=$(printf '%s\n\n%s\n\n%s' \
              "### 🤖 Alerta de CI: Falha detetada" \
              "A execução dos testes/lint falhou. O assistente de IA analisou os logs e sugere a seguinte correção:" \
              "$AI_MESSAGE"
          )

            gh pr comment "$GH_PR_NUMBER" --body "$FULL_COMMENT"
          else
            echo "Push direto detetado. Ignorando comentário no PR."
          fi

          exit 1