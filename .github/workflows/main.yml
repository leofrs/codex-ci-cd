name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ] # Executa a cada push nessas branches
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Executa a validação padrão do seu projeto (Testes / Linter)
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Exemplo)
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install Dependencies
        run: npm install

      # ETAPA QUE VAI FALHAR: Rodar os testes ou o padrão de código
      - name: Run Code Standard & Tests
        run: npm run lint # Se os seus testes quebrarem aqui, o Job falha e o próximo assume